<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HakGame - Apps</title>
    <link rel="icon" type="image/png" href="../hakgame.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0c0814;
            color: #ffffff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .neon-bg-effects {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            background: 
                radial-gradient(circle at 15% 25%, rgba(186, 104, 200, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(147, 112, 219, 0.1) 0%, transparent 40%);
        }
        header {
            position: sticky;
            top: 0;
            padding: 20px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12, 8, 20, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-direction: row-reverse;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .studio-logo {
            width: 45px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(186, 104, 200, 0.4);
        }
        .studio-name {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ba68c8, #9370db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav {
            display: flex;
            align-items: center;
        }
        nav ul { display: flex; list-style: none; gap: 35px; margin: 0; padding: 0; }
        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: 0.3s;
        }
        nav a:hover, nav a.active {
            color: #ba68c8;
            text-shadow: 0 0 8px rgba(186, 104, 200, 0.6);
        }
        .apps-page {
            padding: 60px 6%;
            min-height: 70vh;
        }
        .page-title {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff 60%, #ba68c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }
        .app-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .app-card:hover {
            transform: translateY(-5px);
            border-color: #ba68c8;
            box-shadow: 0 10px 30px rgba(186, 104, 200, 0.2);
        }
        .app-icon {
            font-size: 40px;
            color: #ba68c8;
            margin-bottom: 20px;
        }
        .app-title {
            font-size: 22px;
            margin: 0 0 10px 0;
            color: #ffffff;
        }
        .app-desc {
            font-size: 14px;
            color: #a0a0a0;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .app-launch {
            color: #ba68c8;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 8, 20, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .translator-box {
            background: rgba(20, 15, 32, 0.95);
            border: 1px solid #ba68c8;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(186, 104, 200, 0.25);
            transform: translateY(20px);
            transition: 0.3s ease;
        }
        .modal-overlay.active .translator-box {
            transform: translateY(0);
        }
        .translator-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 15px;
        }
        .translator-header h3 {
            margin: 0;
            font-size: 24px;
            color: #ba68c8;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(186, 104, 200, 0.3);
        }
        .close-btn {
            background: transparent;
            border: none;
            color: #a0a0a0;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }
        .close-btn:hover { color: #ff4e00; }
        .translator-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        .lang-select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-select:focus { border-color: #ba68c8; }
        .lang-select option { background: #140f20; color: #fff; }
        .swap-btn {
            background: transparent;
            border: none;
            color: #ba68c8;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .swap-btn:hover { transform: rotate(180deg); color: #9370db; }
        .text-areas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .text-areas { grid-template-columns: 1fr; }
        }
        .text-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            color: #fff;
            padding: 15px;
            font-size: 16px;
            resize: none;
            height: 180px;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }
        .text-box:focus { border-color: #ba68c8; box-shadow: 0 0 10px rgba(186, 104, 200, 0.1); }
        .status-bar {
            margin-top: 15px;
            font-size: 13px;
            color: #a0a0a0;
            text-align: right;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <div class="neon-bg-effects"></div>

    <header>
        <div class="logo-container">
            <img src="../hakgame.png" alt="Hakgame Logo" class="studio-logo">
            <span class="studio-name">HAKGAME</span>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html#home">Home</a></li>
                <li><a href="../index.html#games">Games</a></li>
                <li><a href="#" class="active">Apps</a></li>
                <li><a href="../index.html#profiles">My Profiles</a></li>
            </ul>
        </nav>
    </header>

    <main class="apps-page">
        <h1 class="page-title">HakGame Applications</h1>
        
        <div class="apps-grid">
            
            <div class="app-card" onclick="openTranslator()">
                <i class="fas fa-language app-icon"></i>
                <h3 class="app-title">Hak Translate Tool</h3>
                <p class="app-desc">Translate Tool.</p>
                <div class="app-launch">Open App <i class="fas fa-arrow-right"></i></div>
            </div>

            <div class="app-card" style="opacity: 0.5; cursor: not-allowed;">
                <i class="fas fa-code app-icon" style="color: #666;"></i>
                <h3 class="app-title">Hak Tool v1</h3>
                <p class="app-desc">A specialized developer utility pack and automation panel coming soon for creators.</p>
                <div class="app-launch" style="color: #666;">Coming Soon <i class="fas fa-lock"></i></div>
            </div>

        </div>
    </main>

    <div class="modal-overlay" id="translateModal">
        <div class="translator-box">
            <div class="translator-header">
                <h3><i class="fas fa-language"></i> Hak Translate</h3>
                <button class="close-btn" onclick="closeTranslator()"><i class="fas fa-times"></i></button>
            </div>

            <div class="translator-controls">
                <select class="lang-select" id="langFrom" onchange="triggerInstantTranslation()">
                    <option value="en">English</option>
                    <option value="tr">Türkçe</option>
                    <option value="de">Deutsch</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                </select>
                
                <button class="swap-btn" onclick="swapLanguages()"><i class="fas fa-exchange-alt"></i></button>

                <select class="lang-select" id="langTo" onchange="triggerInstantTranslation()">
                    <option value="tr">Türkçe</option>
                    <option value="en">English</option>
                    <option value="de">Deutsch</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                </select>
            </div>

            <div class="text-areas">
                <textarea class="text-box" id="inputText" placeholder="Type text here..." oninput="handleTyping()"></textarea>
                <textarea class="text-box" id="outputText" placeholder="Translation will appear here..." readonly></textarea>
            </div>
            
            <div class="status-bar" id="statusBar">Instant translation active</div>
        </div>
    </div>

    <script>
        let typingTimer;
        const doneTypingInterval = 300;

        function openTranslator() {
            document.getElementById('translateModal').classList.add('active');
            document.getElementById('inputText').focus();
        }

        function closeTranslator() {
            document.getElementById('translateModal').classList.remove('active');
        }

        function swapLanguages() {
            let from = document.getElementById('langFrom');
            let to = document.getElementById('langTo');
            let temp = from.value;
            from.value = to.value;
            to.value = temp;

            let inputText = document.getElementById('inputText').value;
            let outputText = document.getElementById('outputText').value;
            document.getElementById('inputText').value = outputText;
            document.getElementById('outputText').value = "";
            
            if (outputText.trim()) {
                doTranslation();
            }
        }

        function handleTyping() {
            clearTimeout(typingTimer);
            let text = document.getElementById('inputText').value;
            
            if (!text.trim()) {
                document.getElementById('outputText').value = "";
                document.getElementById('statusBar').innerText = "Instant translation active";
                return;
            }
            
            document.getElementById('statusBar').innerText = "Typing...";
            typingTimer = setTimeout(doTranslation, doneTypingInterval);
        }

        function triggerInstantTranslation() {
            if (document.getElementById('inputText').value.trim()) {
                doTranslation();
            }
        }

        async function doTranslation() {
            let text = document.getElementById('inputText').value;
            let fromLang = document.getElementById('langFrom').value;
            let toLang = document.getElementById('langTo').value;
            let outputBox = document.getElementById('outputText');
            let statusBar = document.getElementById('statusBar');

            if (!text.trim()) {
                outputBox.value = "";
                statusBar.innerText = "Instant translation active";
                return;
            }

            statusBar.innerText = "Translating...";

            try {
                let url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${fromLang}&tl=${toLang}&dt=t&q=${encodeURIComponent(text)}`;
                let response = await fetch(url);
                let data = await response.json();
                
                if(data && data[0]) {
                    let translatedText = data[0].map(item => item[0]).join("");
                    outputBox.value = translatedText;
                    statusBar.innerText = "Synced";
                } else {
                    statusBar.innerText = "Translation error";
                }
            } catch (error) {
                statusBar.innerText = "Connection lost";
                console.error(error);
            }
        }
    </script>

</body>
</html>

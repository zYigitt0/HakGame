<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HakGame - Apps</title>
    <link rel="icon" type="image/png" href="../hakgame.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0c0814;
            color: #ffffff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .neon-bg-effects {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            background: 
                radial-gradient(circle at 15% 25%, rgba(186, 104, 200, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(147, 112, 219, 0.1) 0%, transparent 40%);
            animation: backgroundFloat 12s infinite ease-in-out;
        }
        @keyframes backgroundFloat {
            0%, 100% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.08) translate(15px, -15px); }
        }
        header {
            position: sticky;
            top: 0;
            padding: 20px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12, 8, 20, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-direction: row-reverse;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .studio-logo {
            width: 45px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(186, 104, 200, 0.4);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }
        .logo-container:hover .studio-logo {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 25px rgba(186, 104, 200, 0.8);
        }
        .studio-name {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ba68c8, #9370db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav {
            display: flex;
            align-items: center;
        }
        nav ul { display: flex; list-style: none; gap: 35px; margin: 0; padding: 0; }
        nav li { position: relative; }
        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: 0.3s;
            padding-bottom: 6px;
        }
        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #ba68c8;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(186, 104, 200, 0.8);
        }
        nav a:hover::after, nav a.active::after {
            width: 100%;
        }
        nav a:hover, nav a.active {
            color: #ba68c8;
            text-shadow: 0 0 8px rgba(186, 104, 200, 0.6);
        }
        .apps-page {
            padding: 60px 6%;
            min-height: 70vh;
        }
        .page-title {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff 60%, #ba68c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleFocus 0.8s ease;
        }
        @keyframes titleFocus {
            from { opacity: 0; transform: translateY(-10px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }
        .app-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), border-color 0.3s, box-shadow 0.4s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) backwards;
        }
        .app-card:nth-child(1) { animation-delay: 0.15s; }
        .app-card:nth-child(2) { animation-delay: 0.3s; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .app-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(186, 104, 200, 0.08), transparent);
            transform: skewX(-25deg);
            transition: none;
        }
        .app-card:hover::before {
            left: 150%;
            transition: left 0.8s ease-in-out;
        }
        .app-card:hover {
            transform: translateY(-8px);
            border-color: rgba(186, 104, 200, 0.6);
            box-shadow: 0 15px 35px rgba(186, 104, 200, 0.15), 0 0 15px rgba(186, 104, 200, 0.05);
        }
        .app-icon {
            font-size: 40px;
            color: #ba68c8;
            margin-bottom: 20px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s;
        }
        .app-card:hover .app-icon {
            transform: scale(1.15) translateY(-4px);
            color: #9370db;
        }
        .app-title {
            font-size: 22px;
            margin: 0 0 10px 0;
            color: #ffffff;
        }
        .app-desc {
            font-size: 14px;
            color: #a0a0a0;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .app-launch {
            color: #ba68c8;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }
        .app-launch i {
            transition: transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .app-card:hover .app-launch {
            color: #9370db;
        }
        .app-card:hover .app-launch i {
            transform: translateX(6px);
        }
        .translate-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 8, 20, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .translate-modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: rgba(12, 8, 20, 0.95);
            border: 1px solid rgba(186, 104, 200, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 750px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(186, 104, 200, 0.1);
            position: relative;
            transform: translateY(-30px) scale(0.95);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
        }
        .translate-modal.active .modal-content {
            transform: translateY(0) scale(1);
        }
        .close-modal {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 24px;
            color: #a0a0a0;
            cursor: pointer;
            transition: transform 0.3s, color 0.3s;
        }
        .close-modal:hover {
            color: #ba68c8;
            transform: rotate(90deg);
        }
        .translate-menu-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            gap: 12px;
        }
        .select-wrapper {
            flex: 1;
            background: #151026;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 4px 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .select-wrapper:focus-within {
            border-color: #ba68c8;
            box-shadow: 0 0 10px rgba(186, 104, 200, 0.15);
        }
        .translate-menu-bar select {
            width: 100%;
            background: transparent;
            color: #fff;
            border: none;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }
        .translate-menu-bar select option {
            background: #151026;
            color: #fff;
        }
        .swap-languages-btn {
            background: #151026;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ba68c8;
            font-size: 14px;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
        }
        .swap-languages-btn i {
            transition: transform 0.4s ease;
        }
        .swap-languages-btn:hover {
            background: rgba(186, 104, 200, 0.12);
            border-color: #ba68c8;
            color: #fff;
        }
        .swap-languages-btn:active i {
            transform: rotate(180deg);
        }
        .translate-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .textarea-container {
            position: relative;
            width: 100%;
        }
        .translate-grid textarea {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 15px;
            height: 200px;
            resize: none;
            font-size: 15px;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.3s, background-color 0.3s, box-shadow 0.3s;
        }
        .translate-grid textarea:focus {
            border-color: #ba68c8;
            background: rgba(0, 0, 0, 0.4);
        }
        .typing-loader {
            display: none;
            position: absolute;
            bottom: 15px;
            right: 20px;
            align-items: center;
            gap: 5px;
            background: rgba(21, 16, 38, 0.85);
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid rgba(186, 104, 200, 0.25);
            pointer-events: none;
        }
        .typing-loader.active {
            display: flex;
        }
        .typing-loader .dot {
            width: 6px;
            height: 6px;
            background: #ba68c8;
            border-radius: 50%;
            animation: waveDots 1.2s infinite ease-in-out;
        }
        .typing-loader .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-loader .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes waveDots {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        .output-container.loading textarea {
            border-color: rgba(186, 104, 200, 0.4);
            box-shadow: 0 0 12px rgba(186, 104, 200, 0.1);
        }
        .card-title {
            font-size: 24px;
            margin: 0 0 12px 0;
            color: #ffffff;
        }
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 15px 4%;
            }
            nav ul { gap: 20px; }
            nav a { font-size: 14px; }
            .apps-page { padding: 40px 4%; }
            .page-title { font-size: 32px; text-align: center; }
            .modal-content { padding: 25px 15px; width: 90%; }
            .translate-menu-bar { flex-direction: column; gap: 10px; }
            .select-wrapper { width: 100%; box-sizing: border-box; padding: 2px 12px; }
            .swap-languages-btn { width: 40px; height: 40px; border-radius: 12px; transform: rotate(90deg); }
            .translate-grid { grid-template-columns: 1fr; gap: 15px; }
            .translate-grid textarea { height: 140px; }
        }
    </style>
</head>
<body>

    <div class="neon-bg-effects"></div>

    <header>
        <div class="logo-container">
            <img src="../hakgame.png" alt="Hakgame Logo" class="studio-logo">
            <span class="studio-name">HAKGAME</span>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html#home">Home</a></li>
                <li><a href="../index.html#games">Games</a></li>
                <li><a href="#" class="active">Apps</a></li>
                <li><a href="../index.html#profiles">My Profiles</a></li>
            </ul>
        </nav>
    </header>

    <main class="apps-page">
        <h1 class="page-title">HakGame Applications</h1>
        
        <div class="apps-grid">
            
            <div class="app-card" onclick="openTranslateModal()">
                <i class="fas fa-language app-icon"></i>
                <h3 class="app-title">Hak Translate Tool</h3>
                <p class="app-desc">Translate tool.</p>
                <div class="app-launch">Open App <i class="fas fa-arrow-right"></i></div>
            </div>

            <div class="app-card" style="opacity: 0.5; cursor: not-allowed;">
                <i class="fas fa-code app-icon" style="color: #666;"></i>
                <h3 class="app-title">Hak Tool v1</h3>
                <p class="app-desc">A specialized developer utility pack and automation panel coming soon for creators.</p>
                <div class="app-launch" style="color: #666;">Coming Soon <i class="fas fa-lock"></i></div>
            </div>

        </div>
    </main>

    <div id="translateModal" class="translate-modal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="closeTranslateModal()"></i>
            <h3 class="card-title" style="text-align: left; margin-bottom: 20px;">
                <i class="fas fa-brain" style="color: #ba68c8; margin-right: 10px;"></i> Hak Translate Engine
            </h3>
            
            <div class="translate-menu-bar">
                <div class="select-wrapper">
                    <select id="sourceLang" onchange="triggerTranslation()">
                        <option value="auto">Detect Language (Auto)</option>
                        <option value="en">English</option>
                        <option value="tr">Turkish</option>
                        <option value="es">Spanish</option>
                        <option value="de">German</option>
                        <option value="fr">French</option>
                    </select>
                </div>
                
                <button class="swap-languages-btn" onclick="swapLanguages()" title="Swap Languages">
                    <i class="fas fa-exchange-alt"></i>
                </button>
                
                <div class="select-wrapper">
                    <select id="targetLang" onchange="triggerTranslation()">
                        <option value="tr">Turkish</option>
                        <option value="en">English</option>
                        <option value="es">Spanish</option>
                        <option value="de">German</option>
                        <option value="fr">French</option>
                    </select>
                </div>
            </div>
            
            <div class="translate-grid">
                <div class="textarea-container">
                    <textarea id="sourceText" placeholder="Type or paste context here, system will analyze automatically..." oninput="triggerTranslation()"></textarea>
                </div>
                
                <div class="textarea-container output-container">
                    <textarea id="targetText" placeholder="Translation output will appear here..." readonly></textarea>
                    
                    <div class="typing-loader" id="typingLoader">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let debounceTimer;
        
        function openTranslateModal() {
            document.getElementById('translateModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeTranslateModal() {
            document.getElementById('translateModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        function swapLanguages() {
            const sourceSelect = document.getElementById('sourceLang');
            const targetSelect = document.getElementById('targetLang');
            const sourceText = document.getElementById('sourceText');
            const targetText = document.getElementById('targetText');
            const swapBtnIcon = document.querySelector('.swap-languages-btn i');

            swapBtnIcon.style.transform = swapBtnIcon.style.transform === 'rotate(180deg)' ? 'rotate(0deg)' : 'rotate(180deg)';

            let currentSource = sourceSelect.value;
            let currentTarget = targetSelect.value;

            if (currentSource === 'auto') {
                currentSource = currentTarget;
                currentTarget = (currentSource === 'tr') ? 'en' : 'tr';
            } else {
                let temp = currentSource;
                currentSource = currentTarget;
                currentTarget = temp;
            }

            sourceSelect.value = currentSource;
            targetSelect.value = currentTarget;

            let tempText = sourceText.value;
            sourceText.value = targetText.value;
            targetText.value = tempText;

            triggerTranslation();
        }

        function triggerTranslation() {
            const text = document.getElementById('sourceText').value;
            const source = document.getElementById('sourceLang').value;
            const target = document.getElementById('targetLang').value;
            const loader = document.getElementById('typingLoader');
            const outputContainer = document.querySelector('.output-container');

            clearTimeout(debounceTimer);

            if (!text.trim()) {
                document.getElementById('targetText').value = '';
                loader.classList.remove('active');
                outputContainer.classList.remove('loading');
                return;
            }

            loader.classList.add('active');
            outputContainer.classList.add('loading');

            debounceTimer = setTimeout(() => {
                fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${source}&tl=${target}&dt=t&q=${encodeURIComponent(text)}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data && data[0]) {
                            let translated = data[0].map(item => item[0]).join('');
                            document.getElementById('targetText').value = translated;
                        }
                    })
                    .catch(() => {
                        document.getElementById('targetText').value = 'Translation failed.';
                    })
                    .finally(() => {
                        loader.classList.remove('active');
                        outputContainer.classList.remove('loading');
                    });
            }, 300);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('translateModal');
            if (event.target === modal) {
                closeTranslateModal();
            }
        }
    </script>

</body>
</html>
